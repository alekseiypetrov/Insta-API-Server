name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        run: docker --version

      - name: Build services
        run: docker-compose build

      - name: Run services
        run: docker-compose up -d

      - name: Check running containers
        run: docker ps
