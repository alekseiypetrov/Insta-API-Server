services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: app
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./empty.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service-1
      - user-service-2
      - post-service-1
      - post-service-2
      - feed-service-1
      - feed-service-2
    networks:
      - app-network

  user-service-1:
    image: alekseiypetrov/user-service:latest
    container_name: user-service-1
    restart: always
    depends_on:
      - mongo
    networks:
      - app-network

  user-service-2:
    image: alekseiypetrov/user-service:latest
    container_name: user-service-2
    restart: always
    depends_on:
      - mongo
    networks:
      - app-network

  # user-service:
  #   image: alekseiypetrov/user-service:latest
  #   container_name: user-service
  #   restart: always
  #   ports:
  #     - "8081:8080"
  #   depends_on:
  #     - mongo
  #   # env_file:
  #   #   - .env

  post-service-1:
    image: alekseiypetrov/post-service:latest
    container_name: post-service-1
    restart: always
    depends_on:
      - mongo
    networks:
      - app-network

  post-service-2:
    image: alekseiypetrov/post-service:latest
    container_name: post-service-2
    restart: always
    depends_on:
      - mongo
    networks:
      - app-network

  # post-service:
  #   image: alekseiypetrov/post-service:latest
  #   container_name: post-service
  #   restart: always
  #   ports:
  #     - "8082:8080"
  #   depends_on:
  #     - mongo
  #   # env_file:
  #   #   - .env

  feed-service-1:
    image: alekseiypetrov/feed-service:latest
    container_name: feed-service-1
    restart: always
    depends_on:
      - user-service-1
      - post-service-1
    networks:
      - app-network

  feed-service-2:
    image: alekseiypetrov/feed-service:latest
    container_name: feed-service-2
    restart: always
    depends_on:
      - user-service-2
      - post-service-2
    networks:
      - app-network

  # feed-service:
  #   image: alekseiypetrov/feed-service:latest
  #   container_name: feed-service
  #   restart: always
  #   ports:
  #     - "8083:8080"
  #   depends_on:
  #     - user-service
  #     - post-service
  #   # env_file:
  #   #   - .env

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: [ "--config=/etc/otel-config.yaml" ]
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"
    networks:
      - app-network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - app-network

volumes:
  mongo_data:


networks:
  app-network:
    driver: bridge
