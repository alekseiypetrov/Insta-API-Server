services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: app
    volumes:
      - mongo_data:/data/db

  user-service:
    image: alekseiypetrov/user-service:latest
    container_name: user-service
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mongo
    # env_file:
    #   - .env

  post-service:
    image: alekseiypetrov/post-service:latest
    container_name: post-service
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - mongo
    # env_file:
    #   - .env

  feed-service:
    image: alekseiypetrov/feed-service:latest
    container_name: feed-service
    restart: always
    ports:
      - "8083:8080"
    depends_on:
      - user-service
      - post-service
    # env_file:
    #   - .env

volumes:
  mongo_data:
