services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: app
    volumes:
      - mongo_data:/data/db

  user-service:
    image: alekseiypetrov/user-service:latest
    container_name: user-service
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mongo
    # env_file:
    #   - .env

  post-service:
    image: alekseiypetrov/post-service:latest
    container_name: post-service
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - mongo
    # env_file:
    #   - .env

  feed-service:
    image: alekseiypetrov/feed-service:latest
    container_name: feed-service
    restart: always
    ports:
      - "8083:8080"
    depends_on:
      - user-service
      - post-service
    # env_file:
    #   - .env

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

volumes:
  mongo_data:
