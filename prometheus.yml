scrape_configs:
  - job_name: "post-service"
    metrics_path: /posts/metrics
    static_configs:
      - targets:
          - "post-service-1:8080"
          - "post-service-2:8080"

  - job_name: "user-service"
    metrics_path: /users/metrics
    static_configs:
      - targets:
          - "user-service-1:8080"
          - "user-service-2:8080"

  - job_name: "feed-service"
    metrics_path: /feed/metrics
    static_configs:
      - targets:
          - "feed-service-1:8080"
          - "feed-service-2:8080"